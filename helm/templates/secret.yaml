{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "xray-mcp.fullname" . }}
  labels:
    {{- include "xray-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  XRAY_CLIENT_ID: {{ required "credentials.clientId is required when existingSecret is not set" .Values.credentials.clientId | b64enc | quote }}
  XRAY_CLIENT_SECRET: {{ required "credentials.clientSecret is required when existingSecret is not set" .Values.credentials.clientSecret | b64enc | quote }}
{{- end }}
