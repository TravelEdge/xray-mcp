apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "xray-mcp.fullname" . }}
  labels:
    {{- include "xray-mcp.labels" . | nindent 4 }}
data:
  TRANSPORT: "http"
  PORT: "3000"
  XRAY_REGION: {{ .Values.xray.region | quote }}
  XRAY_CREDENTIAL_MODE: {{ .Values.xray.credentialMode | quote }}
